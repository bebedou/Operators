<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Squad Leader Protocol - Tactical Operations Command System. A text-based tactical RPG where you manage a SWAT/Spec-Ops squad.">
    <title>SQUAD LEADER // PROTOCOL</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="root"></div>
    <div class="scanline"></div>

    <!-- Plain JS (no JSX) — loaded synchronously in order -->
    <script src="js/utils.js"></script>
    <script src="js/persistence.js"></script>
    <script src="js/traits.js"></script>
    <script src="js/reputation.js"></script>
    <script src="js/recruitment.js"></script>

    <!-- JSX files — transformed by Babel in document order -->
    <script type="text/babel" src="js/components.js"></script>
    <script type="text/babel" src="js/game.js"></script>
    <script type="text/babel" src="js/app.js"></script>
</body>

</html>
